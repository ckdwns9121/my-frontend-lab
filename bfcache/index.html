<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BFCache Lab</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <p class="eyebrow">Browser API Lab</p>
        <h1>BFCache 실험</h1>
        <p class="description">
          뒤로가기/앞으로가기 시 페이지가 새로 로드되는지, 브라우저 캐시에서 상태째로 복원되는지
          확인합니다.
        </p>

        <dl class="status">
          <div>
            <dt>페이지 생성 ID</dt>
            <dd id="pageId"></dd>
          </div>
          <div>
            <dt>Navigation type</dt>
            <dd id="navigationType"></dd>
          </div>
          <div>
            <dt>마지막 pageshow</dt>
            <dd id="lastPageshow"></dd>
          </div>
        </dl>

        <div class="controls">
          <button id="increment" type="button">카운터 증가</button>
          <span id="count" class="count">0</span>
        </div>

        <label class="field" for="memo">
          <span>메모 입력</span>
          <textarea id="memo" rows="4" placeholder="뒤로가기로 돌아왔을 때 값이 유지되는지 확인"></textarea>
        </label>

        <a class="button-link" href="./detail.html">상세 페이지로 이동</a>
      </section>

      <section class="panel">
        <h2>이벤트 로그</h2>
        <ol id="log" class="log"></ol>
      </section>
    </main>

    <script src="./index.js"></script>
  </body>
</html>
